upstream homex_asgi {
    server 127.0.0.1:8000;   # совпадает с BACKEND_PORT
    keepalive 32;
}

# ──────────────────────────────────────────────
# HTTP — только редирект + ACME-challenge
# ──────────────────────────────────────────────
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;   # <-- замените

    # Certbot использует этот путь при получении/обновлении сертификата
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ──────────────────────────────────────────────
# HTTPS
# ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;   # <-- замените

    # Пути выставляет certbot автоматически
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Mozilla Intermediate config (TLS 1.2 + 1.3)
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS — браузеры запомнят HTTPS на 1 год
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Статика ---
    location /static/ {
        alias /srv/homex/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Медиафайлы ---
    location /media/ {
        alias /srv/homex/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- API + WebSocket ---
    location / {
        proxy_pass http://homex_asgi;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (Django Channels)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 10s;

        client_max_body_size 20M;
    }
}
